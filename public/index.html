<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <title>RHD Talk Walkie Talkie</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #ffffff;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* The 3D Button Container */
        #talk-btn {
            position: relative;
            background: #f8f9fa; 
            border: 2px solid #e9ecef;
            border-radius: 35px;
            padding: 25px;
            cursor: pointer;
            outline: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            
            box-shadow: 
                0 15px 0 #ced4da, 
                0 25px 30px rgba(0, 0, 0, 0.15);
                
            transition: transform 0.1s cubic-bezier(0.4, 0.0, 0.2, 1), 
                        box-shadow 0.1s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        /* The Logo Image */
        #talk-btn img {
            max-width: 75vw;
            max-height: 40vh;
            height: auto;
            display: block;
            border-radius: 15px; 
            pointer-events: none; 
        }

        /* The Pressed & Recording State */
        #talk-btn.active {
            transform: translateY(12px);
            background: #ffffff;
            border-color: #dee2e6;
            
            box-shadow: 
                0 3px 0 #ced4da, 
                0 5px 10px rgba(0, 0, 0, 0.1);
        }

        /* The vibrant glowing recording ring */
        #talk-btn.active::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 37px; 
            z-index: -1;
            box-shadow: 0 0 30px 10px rgba(46, 204, 113, 0.6);
            animation: pulse-glow 1.5s infinite alternate;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 20px 5px rgba(46, 204, 113, 0.5); }
            to { box-shadow: 0 0 45px 15px rgba(46, 204, 113, 0.9); }
        }

        /* Status Text */
        #status {
            margin-top: 60px; 
            font-size: 1.2rem;
            font-weight: 600;
            color: #6c757d;
            letter-spacing: 0.5px;
            text-align: center;
            text-transform: uppercase;
        }

        #status.recording {
            color: #2ecc71;
        }
    </style>
</head>
<body>

    <button id="talk-btn">
        <img src="image_0.png" alt="RHD Talk Push-to-Talk" />
    </button>
    <div id="status">Waiting for Mic Permission...</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const talkBtn = document.getElementById('talk-btn');
        const statusDiv = document.getElementById('status');

        let mediaRecorder;
        let audioChunks = [];

        socket.on('connect', () => { statusDiv.textContent = 'Ready. Press & Hold to Talk.'; });
        socket.on('disconnect', () => { statusDiv.textContent = 'Disconnected.'; });

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                statusDiv.textContent = 'Ready. Press & Hold to Talk.';

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        // CROSS-PLATFORM FIX: Removed { type: 'audio/webm' }
                        const audioBlob = new Blob(audioChunks); 
                        socket.emit('audioMessage', audioBlob);
                    }
                    audioChunks = [];
                    statusDiv.textContent = 'Ready. Press & Hold to Talk.';
                };
            })
            .catch(err => {
                statusDiv.textContent = 'Microphone access denied.';
                console.error('Mic error:', err);
            });

        // --- Push-to-Talk Logic ---
        
        const startRecording = (e) => {
            e.preventDefault(); 
            if (mediaRecorder && mediaRecorder.state === 'inactive') {
                mediaRecorder.start();
                
                talkBtn.classList.add('active'); 
                statusDiv.classList.add('recording');
                statusDiv.textContent = 'Recording...';
            }
        };

        const stopRecording = (e) => {
            e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                
                talkBtn.classList.remove('active'); 
                statusDiv.classList.remove('recording');
                statusDiv.textContent = 'Transmitting...';
            }
        };

        talkBtn.addEventListener('mousedown', startRecording);
        talkBtn.addEventListener('mouseup', stopRecording);
        talkBtn.addEventListener('mouseleave', stopRecording);
        
        talkBtn.addEventListener('touchstart', startRecording, {passive: false});
        talkBtn.addEventListener('touchend', stopRecording, {passive: false});
        talkBtn.addEventListener('touchcancel', stopRecording, {passive: false});

        // --- Audio Playback Logic ---

        socket.on('audioMessage', audioData => {
            statusDiv.textContent = 'Receiving Message...';
            
            // CROSS-PLATFORM FIX: Removed { type: 'audio/webm' }
            const blob = new Blob([audioData]);
            const audioUrl = URL.createObjectURL(blob);
            const audio = new Audio(audioUrl);
            
            audio.play()
                .then(() => {
                    audio.onended = () => { 
                        statusDiv.textContent = 'Ready. Press & Hold to Talk.'; 
                        URL.revokeObjectURL(audioUrl); 
                    };
                })
                .catch(e => console.error("Error playing audio:", e));
        });

        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered!', reg))
                    .catch(err => console.error('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
