<script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const talkBtn = document.getElementById('talk-btn');
        const statusDiv = document.getElementById('status');
        const audioPlayer = document.getElementById('incoming-audio');

        let mediaRecorder;
        let audioChunks = [];
        let isAudioUnlocked = false;
        let currentAudioUrl = null; // Tracks the current audio file to prevent memory leaks
        let wakeLock = null; // Tracks the screen wake lock

        // --- Screen Wake Lock Logic (Prevents phone from sleeping) ---
        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator && wakeLock === null) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Screen Wake Lock active - phone will not sleep.');
                    
                    // If the user switches apps and comes back, re-request the lock
                    document.addEventListener('visibilitychange', async () => {
                        if (document.visibilityState === 'visible') {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                }
            } catch (err) {
                console.error('Wake Lock error:', err);
            }
        };

        socket.on('connect', () => { statusDiv.textContent = 'Ready. Press & Hold to Talk.'; });
        socket.on('disconnect', () => { statusDiv.textContent = 'Disconnected.'; });

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                let options = {};
                if (MediaRecorder.isTypeSupported('audio/webm')) {
                    options.mimeType = 'audio/webm';
                } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
                    options.mimeType = 'audio/mp4'; 
                }

                mediaRecorder = new MediaRecorder(stream, options);
                statusDiv.textContent = 'Ready. Press & Hold to Talk.';

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                        socket.emit('audioMessage', { 
                            audio: audioBlob, 
                            type: mediaRecorder.mimeType 
                        });
                    }
                    audioChunks = [];
                    statusDiv.textContent = 'Ready. Press & Hold to Talk.';
                };
            })
            .catch(err => {
                statusDiv.textContent = 'Microphone access denied.';
                console.error('Mic error:', err);
            });

        // --- Push-to-Talk Logic ---
        
        const startRecording = (e) => {
            e.preventDefault(); 
            
            // Request the screen to stay on as soon as they interact with the app
            requestWakeLock();

            if (!isAudioUnlocked) {
                audioPlayer.play().catch(() => {}); 
                isAudioUnlocked = true;
            }

            if (mediaRecorder && mediaRecorder.state === 'inactive') {
                mediaRecorder.start();
                talkBtn.classList.add('active'); 
                statusDiv.classList.add('recording');
                statusDiv.textContent = 'Recording...';
            }
        };

        const stopRecording = (e) => {
            e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                talkBtn.classList.remove('active'); 
                statusDiv.classList.remove('recording');
                statusDiv.textContent = 'Transmitting...';
            }
        };

        talkBtn.addEventListener('mousedown', startRecording);
        talkBtn.addEventListener('mouseup', stopRecording);
        talkBtn.addEventListener('mouseleave', stopRecording);
        
        talkBtn.addEventListener('touchstart', startRecording, {passive: false});
        talkBtn.addEventListener('touchend', stopRecording, {passive: false});
        talkBtn.addEventListener('touchcancel', stopRecording, {passive: false});

        // --- Audio Playback & Memory Management Logic ---

        socket.on('audioMessage', data => {
            statusDiv.textContent = 'Receiving Message...';
            
            // 🚨 MEMORY LEAK FIX: If an old audio file exists, destroy it before making a new one
            if (currentAudioUrl) {
                URL.revokeObjectURL(currentAudioUrl);
            }
            
            const blob = new Blob([data.audio], { type: data.type });
            currentAudioUrl = URL.createObjectURL(blob);
            
            audioPlayer.src = currentAudioUrl;
            audioPlayer.play()
                .then(() => {
                    audioPlayer.onended = () => { 
                        statusDiv.textContent = 'Ready. Press & Hold to Talk.'; 
                        // Clean up memory when finished naturally
                        URL.revokeObjectURL(currentAudioUrl);
                        currentAudioUrl = null;
                    };
                })
                .catch(e => {
                    console.error("Playback failed:", e);
                    statusDiv.textContent = 'Ready. Press & Hold to Talk.';
                });
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
