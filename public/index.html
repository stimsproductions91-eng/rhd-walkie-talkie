<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // WAREHOUSE COMMS</title>
    <style>
        :root {
            --term-green: #39ff14;
            --term-bg: #050505;
            --term-red: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            text-transform: uppercase;
        }

        header {
            border-bottom: 2px solid var(--term-green);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        #status-indicator {
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #comms-log {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid var(--term-green);
            padding: 10px;
            margin-bottom: 20px;
            background-color: #0a0a0a;
        }

        .message {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #1a4d1a;
        }

        .timestamp {
            font-size: 0.8em;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        audio {
            width: 100%;
            height: 30px;
            outline: none;
            filter: sepia(100%) hue-rotate(80deg) saturate(400%); /* Gives the player a slight terminal tint */
        }

        #ptt-button {
            background-color: transparent;
            color: var(--term-green);
            border: 2px solid var(--term-green);
            padding: 20px;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
            user-select: none;
            touch-action: manipulation; /* Prevents zoom on mobile double-tap */
        }

        #ptt-button:active, #ptt-button.recording {
            background-color: var(--term-green);
            color: var(--term-bg);
        }

        #ptt-button:disabled {
            border-color: var(--term-red);
            color: var(--term-red);
            cursor: not-allowed;
        }

        .transmitting-text {
            color: var(--term-red);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div>SYS.COMMS // CH-04 [OUTBOUND]</div>
        <div id="status-indicator">STANDBY</div>
    </header>

    <div id="comms-log">
        <div class="message">
            <div class="timestamp">> SYSTEM INIT... SECURE CONNECTION ESTABLISHED.</div>
        </div>
    </div>

    <button id="ptt-button">HOLD TO TRANSMIT</button>

    <script>
        const pttButton = document.getElementById('ptt-button');
        const commsLog = document.getElementById('comms-log');
        const statusIndicator = document.getElementById('status-indicator');

        let mediaRecorder;
        let audioChunks = [];

        // 1. Request Microphone Access on Load
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    appendMessageToLog(audioUrl);
                    audioChunks = []; // Reset for next transmission
                };

            } catch (err) {
                console.error("Mic access denied:", err);
                pttButton.disabled = true;
                pttButton.innerText = "ERR: NO MIC DETECTED";
                statusIndicator.innerText = "OFFLINE";
                statusIndicator.style.color = "var(--term-red)";
            }
        }

        // 2. Handle Push-to-Talk Logic
        function startRecording() {
            if (mediaRecorder && mediaRecorder.state === "inactive") {
                mediaRecorder.start();
                pttButton.classList.add('recording');
                pttButton.innerText = "[ TRANSMITTING ]";
                statusIndicator.innerHTML = "<span class='transmitting-text'>REC OVERRIDE</span>";
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                pttButton.classList.remove('recording');
                pttButton.innerText = "HOLD TO TRANSMIT";
                statusIndicator.innerText = "STANDBY";
            }
        }

        // 3. UI Events (Supports both Mouse and Touch for mobile)
        pttButton.addEventListener('mousedown', startRecording);
        pttButton.addEventListener('mouseup', stopRecording);
        pttButton.addEventListener('mouseleave', stopRecording); // Failsafe if mouse drags off button

        pttButton.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents default touch behaviors
            startRecording();
        });
        pttButton.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });

        // 4. Render the Audio Drop in the Terminal
        function appendMessageToLog(audioUrl) {
            const timeString = new Date().toLocaleTimeString([], { hour12: false });
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            messageDiv.innerHTML = `
                <div class="timestamp">> RECV_PAYLOAD // TIME: ${timeString}</div>
                <audio controls src="${audioUrl}"></audio>
            `;
            
            commsLog.appendChild(messageDiv);
            
            // Auto-scroll to the newest message
            commsLog.scrollTop = commsLog.scrollHeight;
        }

        // Boot up
        initAudio();
    </script>
</body>
</html>
